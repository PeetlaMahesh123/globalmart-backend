spring.application.name=globalmart
server.port=9096

# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/globalmart
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# JWT
jwt.secret=ThisIsMyVeryLongSecretKeyForJWTGenerationAndItMustBeAtLeast64CharactersLong1234567890
jwt.expiration=3600000

# CORS
spring.web.cors.allowed-origins=CORS_ORIGIN
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=Content-Type,Authorization
spring.web.cors.allow-credentials=true

